<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Sign In</mat-card-title>
      <mat-card-subtitle>Enter your credentials to access your account</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Error Alert -->
        <mat-error *ngIf="error$ | async as error" class="error-alert">
          <mat-icon>error</mat-icon>
          <span>{{ error }}</span>
        </mat-error>
        
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input 
            matInput 
            type="email" 
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            {{ getErrorMessage('email') }}
          </mat-error>
        </mat-form-field>
        
        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input 
            matInput 
            type="password" 
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password">
          <mat-icon matPrefix>lock</mat-icon>
          <mat-error *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            {{ getErrorMessage('password') }}
          </mat-error>
        </mat-form-field>
        
        <!-- Forgot Password Link -->
        <div class="forgot-password">
          <a routerLink="/auth/forgot-password" mat-button color="primary">
            Forgot Password?
          </a>
        </div>
        
        <!-- Submit Button -->
        <button 
          mat-raised-button 
          color="primary" 
          type="submit"
          class="full-width submit-button"
          [disabled]="(loading$ | async) || loginForm.invalid">
          <mat-spinner *ngIf="loading$ | async" diameter="20"></mat-spinner>
          <span *ngIf="!(loading$ | async)">Sign In</span>
        </button>
      </form>
    </mat-card-content>
    
    <mat-card-footer>
      <div class="register-link">
        Don't have an account? 
        <a routerLink="/auth/register" mat-button color="accent">Sign Up</a>
      </div>
    </mat-card-footer>
  </mat-card>
</div>
