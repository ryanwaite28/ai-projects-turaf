version: '3.8'

services:
  # PostgreSQL Database with multi-schema architecture
  postgres:
    image: postgres:15.3-alpine
    container_name: turaf-postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-turaf}
      - POSTGRES_USER=${DB_ADMIN_USER:-turaf_admin}
      - POSTGRES_PASSWORD=${DB_ADMIN_PASSWORD:-admin_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - turaf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER:-turaf_admin} -d ${DB_NAME:-turaf}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MiniStack for AWS service emulation (free, open-source LocalStack alternative)
  ministack:
    image: nahuelnucera/ministack
    container_name: turaf-ministack
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - LOG_LEVEL=${MINISTACK_LOG_LEVEL:-INFO}
      - IDENTITY_USER_PASSWORD=${IDENTITY_USER_PASSWORD:-identity_password_change_me}
      - ORGANIZATION_USER_PASSWORD=${ORGANIZATION_USER_PASSWORD:-organization_password_change_me}
      - EXPERIMENT_USER_PASSWORD=${EXPERIMENT_USER_PASSWORD:-experiment_password_change_me}
      - METRICS_USER_PASSWORD=${METRICS_USER_PASSWORD:-metrics_password_change_me}
      - COMMUNICATIONS_USER_PASSWORD=${COMMUNICATIONS_USER_PASSWORD:-communications_password_change_me}
    volumes:
      - ./infrastructure/docker/ministack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
      - ./infrastructure/docker/ministack/init-lambda-services.sh:/etc/localstack/init/ready.d/init-lambda-services.sh:ro
    ports:
      - "4566:4566"
    networks:
      - turaf-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Centralized Flyway Migrations
  flyway-service:
    image: flyway/flyway:10-alpine
    container_name: turaf-flyway
    command: -configFiles=/flyway/conf/flyway.conf migrate
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-turaf}
      - FLYWAY_USER=${DB_ADMIN_USER:-turaf_admin}
      - FLYWAY_PASSWORD=${DB_ADMIN_PASSWORD:-admin_password_change_me}
      - FLYWAY_PLACEHOLDERS_IDENTITY_USER_PASSWORD=${IDENTITY_USER_PASSWORD:-identity_password_change_me}
      - FLYWAY_PLACEHOLDERS_ORGANIZATION_USER_PASSWORD=${ORGANIZATION_USER_PASSWORD:-organization_password_change_me}
      - FLYWAY_PLACEHOLDERS_EXPERIMENT_USER_PASSWORD=${EXPERIMENT_USER_PASSWORD:-experiment_password_change_me}
      - FLYWAY_PLACEHOLDERS_METRICS_USER_PASSWORD=${METRICS_USER_PASSWORD:-metrics_password_change_me}
      - FLYWAY_PLACEHOLDERS_COMMUNICATIONS_USER_PASSWORD=${COMMUNICATIONS_USER_PASSWORD:-communications_password_change_me}
    volumes:
      - ./services/flyway-service/migrations:/flyway/migrations:ro
      - ./services/flyway-service/flyway.conf:/flyway/conf/flyway.conf:ro
    networks:
      - turaf-network
    depends_on:
      postgres:
        condition: service_healthy

  # Identity Service
  identity-service:
    build:
      context: .
      dockerfile: infrastructure/docker/spring-boot/Dockerfile
      args:
        SERVICE_NAME: identity-service
    container_name: turaf-identity-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_NAME=${DB_NAME:-turaf}
      - DB_USERNAME=identity_user
      - IDENTITY_USER_PASSWORD=${IDENTITY_USER_PASSWORD:-identity_password_change_me}
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-local-development-only-change-in-production-must-be-at-least-32-characters-long}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT=http://ministack:4566
      - EVENTBRIDGE_BUS=turaf-event-bus
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "${IDENTITY_SERVICE_PORT:-8081}:8081"
    networks:
      - turaf-network
    depends_on:
      flyway-service:
        condition: service_completed_successfully
      ministack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # Organization Service
  organization-service:
    build:
      context: .
      dockerfile: infrastructure/docker/spring-boot/Dockerfile
      args:
        SERVICE_NAME: organization-service
    container_name: turaf-organization-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_NAME=${DB_NAME:-turaf}
      - DB_USERNAME=organization_user
      - ORGANIZATION_USER_PASSWORD=${ORGANIZATION_USER_PASSWORD:-organization_password_change_me}
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-local-development-only-change-in-production-must-be-at-least-32-characters-long}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT=http://ministack:4566
      - EVENTBRIDGE_BUS=turaf-event-bus
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "${ORGANIZATION_SERVICE_PORT:-8082}:8082"
    networks:
      - turaf-network
    depends_on:
      flyway-service:
        condition: service_completed_successfully
      ministack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # Experiment Service
  experiment-service:
    build:
      context: .
      dockerfile: infrastructure/docker/spring-boot/Dockerfile
      args:
        SERVICE_NAME: experiment-service
    container_name: turaf-experiment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_NAME=${DB_NAME:-turaf}
      - DB_USERNAME=experiment_user
      - EXPERIMENT_USER_PASSWORD=${EXPERIMENT_USER_PASSWORD:-experiment_password_change_me}
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-local-development-only-change-in-production-must-be-at-least-32-characters-long}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT=http://ministack:4566
      - EVENTBRIDGE_BUS=turaf-event-bus
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "${EXPERIMENT_SERVICE_PORT:-8083}:8083"
    networks:
      - turaf-network
    depends_on:
      flyway-service:
        condition: service_completed_successfully
      ministack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # Metrics Service
  metrics-service:
    build:
      context: .
      dockerfile: infrastructure/docker/spring-boot/Dockerfile
      args:
        SERVICE_NAME: metrics-service
    container_name: turaf-metrics-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_NAME=${DB_NAME:-turaf}
      - DB_USERNAME=metrics_user
      - METRICS_USER_PASSWORD=${METRICS_USER_PASSWORD:-metrics_password_change_me}
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-local-development-only-change-in-production-must-be-at-least-32-characters-long}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT=http://ministack:4566
      - EVENTBRIDGE_BUS=turaf-event-bus
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "${METRICS_SERVICE_PORT:-8084}:8084"
    networks:
      - turaf-network
    depends_on:
      flyway-service:
        condition: service_completed_successfully
      ministack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # BFF API Service
  bff-api:
    build:
      context: .
      dockerfile: infrastructure/docker/spring-boot/Dockerfile
      args:
        SERVICE_NAME: bff-api
    container_name: turaf-bff-api
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-local-development-only-change-in-production-must-be-at-least-32-characters-long}
    ports:
      - "${BFF_API_PORT:-8080}:8080"
    networks:
      - turaf-network
    depends_on:
      identity-service:
        condition: service_healthy
      organization-service:
        condition: service_healthy
      experiment-service:
        condition: service_healthy
      metrics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # Redis for WebSocket scaling
  redis:
    image: redis:7-alpine
    container_name: turaf-redis
    ports:
      - "6379:6379"
    networks:
      - turaf-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # Communications Service
  communications-service:
    build:
      context: .
      dockerfile: infrastructure/docker/spring-boot/Dockerfile
      args:
        SERVICE_NAME: communications-service
    container_name: turaf-communications-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-turaf}
      - DB_USER=communications_user
      - DB_PASSWORD=${COMMUNICATIONS_USER_PASSWORD:-communications_password_change_me}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - SQS_DIRECT_QUEUE=communications-direct-messages.fifo
      - SQS_GROUP_QUEUE=communications-group-messages.fifo
      - EVENTBRIDGE_BUS=turaf-event-bus
      - AWS_ENDPOINT=http://ministack:4566
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-local-development-only-change-in-production-must-be-at-least-32-characters-long}
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    ports:
      - "${COMMUNICATIONS_SERVICE_PORT:-8085}:8085"
    networks:
      - turaf-network
    depends_on:
      flyway-service:
        condition: service_completed_successfully
      ministack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/communications/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # WebSocket Gateway
  ws-gateway:
    build:
      context: ./services/ws-gateway
      dockerfile: Dockerfile
    container_name: turaf-ws-gateway
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-local-development-only-change-in-production-must-be-at-least-32-characters-long}
      - REDIS_URL=redis://redis:6379
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_SQS_ENDPOINT=http://ministack:4566
      - SQS_DIRECT_QUEUE_URL=http://ministack:4566/000000000000/communications-direct-messages.fifo
      - SQS_GROUP_QUEUE_URL=http://ministack:4566/000000000000/communications-group-messages.fifo
      - ALLOWED_ORIGINS=http://localhost:4200
    ports:
      - "${WS_GATEWAY_PORT:-3000}:3000"
    networks:
      - turaf-network
    depends_on:
      redis:
        condition: service_healthy
      ministack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # PgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: turaf-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@turaf.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - turaf-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

networks:
  turaf-network:
    driver: bridge
    name: turaf-network

volumes:
  postgres_data:
    name: turaf-postgres-data
  ministack_data:
    name: turaf-ministack-data
  redis_data:
    name: turaf-redis-data
  pgadmin_data:
    name: turaf-pgadmin-data
