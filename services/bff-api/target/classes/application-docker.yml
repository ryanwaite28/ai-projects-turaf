spring:
  application:
    name: bff-api

server:
  port: 8080

# Service URLs for Docker Compose environment
# Services communicate via container names on the turaf-network
services:
  identity:
    url: http://identity-service:8081
  organization:
    url: http://organization-service:8082
  experiment:
    url: http://experiment-service:8083
  metrics:
    url: http://metrics-service:8084

# CORS configuration for local frontend
cors:
  allowed-origins: http://localhost:4200

# JWT Configuration
jwt:
  secret-key: ${JWT_SECRET}
  expiration: 86400000

# Logging
logging:
  level:
    com.turaf.bff: DEBUG
    org.springframework.web: INFO

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
