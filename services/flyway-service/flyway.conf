# Flyway Configuration for Turaf Platform
# Manages migrations across multiple schemas in a single PostgreSQL database

# Database connection
# These values are overridden by environment variables in CodeBuild
flyway.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:turaf}
flyway.user=${DB_USER:postgres}
flyway.password=${DB_PASSWORD:postgres}

# Schema configuration
# All schemas managed by this Flyway instance
flyway.schemas=identity_schema,organization_schema,experiment_schema,metrics_schema,communications_schema

# Default schema for Flyway metadata table
flyway.defaultSchema=public

# Migration settings
flyway.locations=filesystem:./migrations
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
flyway.baselineDescription=Initial baseline

# Placeholders for use in migration scripts
flyway.placeholders.identity_schema=identity_schema
flyway.placeholders.organization_schema=organization_schema
flyway.placeholders.experiment_schema=experiment_schema
flyway.placeholders.metrics_schema=metrics_schema
flyway.placeholders.communications_schema=communications_schema

# Placeholder replacement
flyway.placeholderReplacement=true
flyway.placeholderPrefix=${
flyway.placeholderSuffix=}

# SQL migration settings
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# Validation
flyway.validateMigrationNaming=true

# Logging
flyway.loggers=console

# Clean (disabled for safety)
flyway.cleanDisabled=true
