spring:
  application:
    name: organization-service
  
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:turaf}?currentSchema=organization_schema
    username: ${DB_USERNAME:organization_user}
    password: ${ORGANIZATION_USER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: organization_schema
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: organization_schema
    default-schema: organization_schema

server:
  port: 8082

logging:
  level:
    com.turaf: DEBUG
    org.springframework: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
