spring:
  application:
    name: identity-service
  
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:turaf}?currentSchema=identity_schema
    username: ${DB_USERNAME:identity_user}
    password: ${IDENTITY_USER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: identity_schema
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: identity_schema
    default-schema: identity_schema

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    com.turaf: DEBUG
    org.springframework: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
