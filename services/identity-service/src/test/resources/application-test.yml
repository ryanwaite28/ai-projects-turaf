spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-testing-must-be-at-least-32-characters-long-for-hs512
  access-token-expiration: 900000  # 15 minutes
  refresh-token-expiration: 604800000  # 7 days

logging:
  level:
    com.turaf: DEBUG
