spring:
  application:
    name: metrics-service
  
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:turaf}?currentSchema=metrics_schema
    username: ${DB_USERNAME:metrics_user}
    password: ${METRICS_USER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: metrics_schema
  
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8084

aws:
  region: ${AWS_REGION:us-east-1}
  endpoint: ${AWS_ENDPOINT:}
  eventbridge:
    bus-name: ${EVENTBRIDGE_BUS:turaf-event-bus}

logging:
  level:
    com.turaf: DEBUG
    org.springframework: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
