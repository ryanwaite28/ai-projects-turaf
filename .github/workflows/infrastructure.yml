name: Deploy Infrastructure

# Requires bootstrap to have been run for each environment first (see bootstrap.yml).
# PROD approval gate: configure required reviewers on the 'prod' GitHub Environment
# at Settings → Environments → prod → Required reviewers.

on:
  push:
    branches: [main, develop]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/infrastructure.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/dev
        run: terraform plan -out=tfplan-dev

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/dev
        run: terraform apply -auto-approve tfplan-dev

      - name: Summary
        working-directory: infrastructure/terraform/environments/dev
        run: |
          echo "## DEV Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY

  terraform-apply-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: terraform-apply-dev
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/qa
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/qa
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/qa
        run: terraform plan -out=tfplan-qa

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/qa
        run: terraform apply -auto-approve tfplan-qa

      - name: Summary
        working-directory: infrastructure/terraform/environments/qa
        run: |
          echo "## QA Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY

  terraform-apply-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: terraform-apply-qa
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    # Pauses here for manual approval before running — configure required reviewers
    # on the 'prod' GitHub Environment at Settings → Environments → prod → Required reviewers.
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/prod
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/prod
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/prod
        run: terraform plan -out=tfplan-prod

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/prod
        run: terraform apply -auto-approve tfplan-prod

      - name: Summary
        working-directory: infrastructure/terraform/environments/prod
        run: |
          echo "## PROD Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY
