  terraform-apply-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    # needs: terraform-plan
    # if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infrastructure/terraform/environments/dev
      
      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/dev
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/dev
        run: terraform plan -out=tfplan-dev
      
      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/dev
        run: terraform apply -auto-approve tfplan-dev
      
      - name: Verify Infrastructure
        working-directory: infrastructure/terraform/environments/dev
        run: |
          echo "## DEV Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY

  terraform-apply-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: terraform-apply-dev
    if: github.ref == 'refs/heads/main'
    environment: qa
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_QA }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-qa
          path: infrastructure/terraform/environments/qa
      
      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/qa
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/qa
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/qa
        run: terraform plan -out=tfplan-qa
      
      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/qa
        run: terraform apply -auto-approve tfplan-qa
      
      - name: Verify Infrastructure
        working-directory: infrastructure/terraform/environments/qa
        run: |
          echo "## QA Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY

  terraform-apply-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: terraform-apply-qa
    if: github.ref == 'refs/heads/main'
    environment: prod
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PROD }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infrastructure/terraform/environments/prod
      
      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/prod
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/prod
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/prod
        run: terraform plan -out=tfplan-prod
      
      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/prod
        run: terraform apply -auto-approve tfplan-prod
      
      - name: Verify Infrastructure
        working-directory: infrastructure/terraform/environments/prod
        run: |
          echo "## PROD Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY
