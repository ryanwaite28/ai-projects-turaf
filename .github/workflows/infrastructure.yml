name: Deploy Shared Infrastructure

on:
  push:
    branches: [main, develop, feature/*]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/infrastructure.yml'
  # workflow_dispatch:
  #   inputs:
  #     environment:
  #       description: 'Environment to deploy'
  #       required: true
  #       type: choice
  #       default: dev
  #       options:
  #         - dev
  #         - qa
  #         - prod

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap-dev:
    name: Bootstrap DEV (S3, DynamoDB, ECR)
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false
      
      - name: Terraform Init (Bootstrap)
        working-directory: infrastructure/terraform/bootstrap
        run: terraform init -backend=false
      
      - name: Terraform Apply (Bootstrap)
        working-directory: infrastructure/terraform/bootstrap
        run: terraform apply -auto-approve -var="environment=dev"
      
      - name: Bootstrap Summary
        working-directory: infrastructure/terraform/bootstrap
        run: |
          echo "## DEV Bootstrap Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** $(terraform output -raw s3_bucket_name)" >> $GITHUB_STEP_SUMMARY
          echo "**DynamoDB Table:** $(terraform output -raw dynamodb_table_name)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ECR Repositories Created:" >> $GITHUB_STEP_SUMMARY
          terraform output -json ecr_repositories | jq -r 'to_entries[] | "- **\(.key)**: \(.value)"' >> $GITHUB_STEP_SUMMARY

  terraform-apply-dev:
    needs: bootstrap-dev
    name: Deploy to DEV
    runs-on: ubuntu-latest
    # needs: terraform-plan
    # if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure/terraform/environments/dev
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: infrastructure/terraform/environments/dev
        run: terraform plan -out=tfplan-dev
      
      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/dev
        run: terraform apply -auto-approve tfplan-dev
      
      - name: Verify Infrastructure
        working-directory: infrastructure/terraform/environments/dev
        run: |
          echo "## DEV Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY

  bootstrap-qa:
    name: Bootstrap QA (S3, DynamoDB, ECR)
    runs-on: ubuntu-latest
    needs: terraform-apply-dev
    if: github.ref == 'refs/heads/main'
