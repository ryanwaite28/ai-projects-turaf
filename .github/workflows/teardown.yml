name: Teardown Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to tear down'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      destroy_bootstrap:
        description: 'Also destroy bootstrap resources (ECR repos, TF state bucket)'
        required: true
        type: boolean
        default: false
      confirmation:
        description: 'Type DESTROY to confirm teardown'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: '1.6.0'
  REPO_OWNER: ryanwaite28

  # Service list (order matters — dependents first)
  SERVICES: >-
    bff-api
    identity-service
    organization-service
    experiment-service
    metrics-service
    communications-service
    ws-gateway

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Gate: verify caller is the repo owner and confirmation text matches
  # ─────────────────────────────────────────────────────────────────────
  authorize:
    name: Authorize Teardown
    runs-on: ubuntu-latest

    steps:
      - name: Verify repository owner
        run: |
          if [[ "${{ github.actor }}" != "${{ env.REPO_OWNER }}" ]]; then
            echo "::error::Teardown can only be triggered by the repository owner (${{ env.REPO_OWNER }}). Actor: ${{ github.actor }}"
            exit 1
          fi
          echo "✅ Actor ${{ github.actor }} is the repository owner"

      - name: Verify confirmation text
        run: |
          if [[ "${{ inputs.confirmation }}" != "DESTROY" ]]; then
            echo "::error::Confirmation text must be exactly 'DESTROY'. Got: '${{ inputs.confirmation }}'"
            exit 1
          fi
          echo "✅ Confirmation text matches"

      - name: Log teardown intent
        run: |
          echo "## ⚠️ Teardown Authorized" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Destroy Bootstrap**: ${{ inputs.destroy_bootstrap }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Phase 1: Destroy all service-specific Terraform (ECS services, TGs, listener rules)
  # ─────────────────────────────────────────────────────────────────────
  destroy-services:
    name: 'Destroy Services (${{ inputs.environment }})'
    needs: authorize
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service:
          - bff-api
          - identity-service
          - organization-service
          - experiment-service
          - metrics-service
          - communications-service
          - ws-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check if service Terraform state exists
        id: check-state
        run: |
          if aws s3 ls "s3://turaf-terraform-state-${{ inputs.environment }}/${{ matrix.service }}/terraform.tfstate" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No Terraform state found for ${{ matrix.service }} — skipping"
          fi

      - name: Terraform Init
        if: steps.check-state.outputs.exists == 'true'
        working-directory: ./services/${{ matrix.service }}/terraform
        run: |
          terraform init \
            -backend-config="bucket=turaf-terraform-state-${{ inputs.environment }}" \
            -backend-config="key=${{ matrix.service }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Destroy
        if: steps.check-state.outputs.exists == 'true'
        working-directory: ./services/${{ matrix.service }}/terraform
        env:
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_service_name: ${{ matrix.service }}
          TF_VAR_image_tag: 'teardown'
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform destroy -auto-approve

      - name: Force-delete ECS service if Terraform failed
        if: failure()
        run: |
          CLUSTER="turaf-cluster-${{ inputs.environment }}"
          SVC="${{ matrix.service }}-${{ inputs.environment }}"
          echo "Attempting force-delete of ECS service ${SVC}..."
          aws ecs update-service --cluster "$CLUSTER" --service "$SVC" --desired-count 0 --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws ecs delete-service --cluster "$CLUSTER" --service "$SVC" --force --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Service teardown summary
        if: always()
        run: |
          echo "## Service Teardown: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **State Found**: ${{ steps.check-state.outputs.exists }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Phase 2: Destroy ONLY cost-incurring shared infrastructure
  #
  # DELETED (costs money):
  #   - module.compute   : ALBs (~$32/month), ECS cluster kept (free)
  #   - module.database   : RDS, Redis, DocumentDB, Secrets Manager
  #   - module.storage    : S3 buckets
  #   - module.monitoring : CloudWatch dashboards ($3/month each)
  #   - Networking: NAT Gateways, Elastic IPs, Interface VPC Endpoints
  #   - Security:  KMS keys ($1/month each)
  #
  # KEPT (free when idle):
  #   - IAM roles, policies, OIDC providers
  #   - Security groups
  #   - VPC, subnets, route tables, Internet Gateway, Gateway Endpoints
  #   - ECS cluster (free without running tasks)
  #   - SQS queues, SNS topics, EventBridge (free when idle)
  #   - Lambda functions (free when not invoked)
  #   - CloudWatch alarms (first 10 free)
  #   - ACM certificates (free)
  # ─────────────────────────────────────────────────────────────────────
  destroy-infrastructure:
    name: 'Destroy Infrastructure (${{ inputs.environment }})'
    needs: destroy-services
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform init

      - name: Disable RDS deletion protection
        run: |
          aws rds modify-db-instance \
            --db-instance-identifier "turaf-db-${{ inputs.environment }}" \
            --no-deletion-protection \
            --apply-immediately \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "RDS instance not found or already unprotected"
          sleep 5

      - name: Disable ALB deletion protection
        run: |
          for ALB_NAME in "turaf-alb-${{ inputs.environment }}" "turaf-internal-alb-${{ inputs.environment }}"; do
            ALB_ARN=$(aws elbv2 describe-load-balancers --names "$ALB_NAME" --region ${{ env.AWS_REGION }} \
              --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "None")
            if [[ "$ALB_ARN" != "None" && -n "$ALB_ARN" ]]; then
              aws elbv2 modify-load-balancer-attributes \
                --load-balancer-arn "$ALB_ARN" \
                --attributes Key=deletion_protection.enabled,Value=false \
                --region ${{ env.AWS_REGION }}
              echo "Disabled deletion protection on $ALB_NAME"
            fi
          done

      # ── Destroy database module (RDS, Redis, DocumentDB, Secrets Manager) ──
      - name: 'Terraform Destroy: database'
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform destroy -auto-approve -lock=false -target=module.database
        timeout-minutes: 30

      # ── Destroy compute module (ALBs — ECS cluster itself is free) ──
      - name: 'Terraform Destroy: compute (ALBs)'
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform destroy -auto-approve -lock=false -target=module.compute
        timeout-minutes: 15

      # ── Destroy storage module (S3 buckets) ──
      - name: 'Terraform Destroy: storage'
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform destroy -auto-approve -lock=false -target=module.storage
        timeout-minutes: 10

      # ── Destroy monitoring module (CloudWatch dashboards cost $3/month) ──
      - name: 'Terraform Destroy: monitoring'
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: terraform destroy -auto-approve -lock=false -target=module.monitoring
        timeout-minutes: 10

      # ── Networking: destroy only NAT Gateways, EIPs, Interface Endpoints (costly) ──
      # Keeps: VPC, subnets, route tables, IGW, S3 gateway endpoint (all free)
      - name: 'Terraform Destroy: NAT Gateways & Elastic IPs'
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: |
          terraform destroy -auto-approve -lock=false \
            -target='module.networking.aws_nat_gateway.main' \
            -target='module.networking.aws_eip.nat' \
            -target='module.networking.aws_route.private_nat_gateway' \
            2>/dev/null || echo "NAT resources not found or already deleted"

      - name: 'Release orphaned Elastic IPs ($3.60/month each)'
        run: |
          echo "Releasing Elastic IPs tagged for ${{ inputs.environment }}..."
          EIPS=$(aws ec2 describe-addresses --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=*turaf*${{ inputs.environment }}*" \
            --query 'Addresses[].AllocationId' --output text 2>/dev/null || echo "")
          if [[ -z "$EIPS" ]]; then
            echo "No orphaned Elastic IPs found"
          else
            for eip in $EIPS; do
              aws ec2 release-address --allocation-id "$eip" --region ${{ env.AWS_REGION }} 2>/dev/null || true
              echo "  Released EIP: $eip"
            done
          fi

      - name: 'Terraform Destroy: Interface VPC Endpoints (~$7.20/month each)'
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: |
          terraform destroy -auto-approve -lock=false \
            -target='module.networking.aws_vpc_endpoint.ecr_api' \
            -target='module.networking.aws_vpc_endpoint.ecr_dkr' \
            -target='module.networking.aws_vpc_endpoint.logs' \
            -target='module.networking.aws_vpc_endpoint.secretsmanager' \
            -target='module.networking.aws_vpc_endpoint.ecs' \
            -target='module.networking.aws_vpc_endpoint.ecs_telemetry' \
            2>/dev/null || echo "VPC endpoints not found or already deleted"

      # ── Security: destroy only KMS keys ($1/month each) ──
      # Keeps: IAM roles, policies, security groups (all free)
      - name: 'Terraform Destroy: KMS keys'
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}
        run: |
          terraform destroy -auto-approve -lock=false \
            -target='module.security.aws_kms_key.main' \
            -target='module.security.aws_kms_alias.main' \
            -target='module.security.aws_kms_key.rds' \
            -target='module.security.aws_kms_alias.rds' \
            -target='module.security.aws_kms_key.s3' \
            -target='module.security.aws_kms_alias.s3' \
            2>/dev/null || echo "KMS keys not found or already deleted"

      - name: Infrastructure teardown summary
        if: always()
        run: |
          echo "## Infrastructure Teardown" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deleted (costs money):" >> $GITHUB_STEP_SUMMARY
          echo "- Database: RDS, Redis, DocumentDB, Secrets Manager" >> $GITHUB_STEP_SUMMARY
          echo "- Compute: ALBs (ECS cluster kept — free)" >> $GITHUB_STEP_SUMMARY
          echo "- Storage: S3 buckets" >> $GITHUB_STEP_SUMMARY
          echo "- Monitoring: CloudWatch dashboards" >> $GITHUB_STEP_SUMMARY
          echo "- Networking: NAT Gateways, Elastic IPs, Interface VPC Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- Security: KMS keys" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Preserved (free):" >> $GITHUB_STEP_SUMMARY
          echo "- IAM roles, policies, security groups" >> $GITHUB_STEP_SUMMARY
          echo "- VPC, subnets, route tables, IGW, S3 gateway endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- ECS cluster, SQS queues, SNS topics, EventBridge, Lambda" >> $GITHUB_STEP_SUMMARY
          echo "- CloudWatch alarms, ACM certificates" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Phase 3: Cleanup remaining resources not in Terraform state
  #   (orphaned log groups, leftover task defs, CloudWatch resources)
  # ─────────────────────────────────────────────────────────────────────
  cleanup-remaining:
    name: 'Cleanup Remaining Resources (${{ inputs.environment }})'
    needs: destroy-infrastructure
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deregister orphaned ECS task definitions
        run: |
          echo "Deregistering orphaned task definitions..."
          for svc in bff-api identity-service organization-service experiment-service metrics-service communications-service ws-gateway; do
            FAMILY="${svc}-${{ inputs.environment }}"
            TASK_DEFS=$(aws ecs list-task-definitions --family-prefix "$FAMILY" --region ${{ env.AWS_REGION }} \
              --query 'taskDefinitionArns[]' --output text 2>/dev/null || echo "")
            for td in $TASK_DEFS; do
              aws ecs deregister-task-definition --task-definition "$td" --region ${{ env.AWS_REGION }} 2>/dev/null || true
              echo "  Deregistered: $td"
            done
          done

      - name: Delete orphaned CloudWatch log groups
        run: |
          echo "Deleting orphaned CloudWatch log groups..."
          LOG_GROUPS=$(aws logs describe-log-groups --region ${{ env.AWS_REGION }} \
            --query "logGroups[?contains(logGroupName,'turaf') || contains(logGroupName,'-${{ inputs.environment }}')].logGroupName" \
            --output text 2>/dev/null || echo "")
          for lg in $LOG_GROUPS; do
            aws logs delete-log-group --log-group-name "$lg" --region ${{ env.AWS_REGION }} 2>/dev/null || true
            echo "  Deleted log group: $lg"
          done

      - name: Delete orphaned CloudWatch alarms
        run: |
          echo "Deleting orphaned CloudWatch alarms..."
          ALARMS=$(aws cloudwatch describe-alarms --region ${{ env.AWS_REGION }} \
            --query "MetricAlarms[?contains(AlarmName,'turaf') || contains(AlarmName,'-${{ inputs.environment }}')].AlarmName" \
            --output text 2>/dev/null || echo "")
          if [[ -n "$ALARMS" ]]; then
            aws cloudwatch delete-alarms --alarm-names $ALARMS --region ${{ env.AWS_REGION }} 2>/dev/null || true
          fi

      - name: Delete orphaned CloudWatch dashboards
        run: |
          aws cloudwatch delete-dashboards \
            --dashboard-names "turaf-${{ inputs.environment }}" \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Delete Secrets Manager secrets (force, no recovery)
        run: |
          echo "Force-deleting remaining Secrets Manager secrets..."
          SECRETS=$(aws secretsmanager list-secrets --region ${{ env.AWS_REGION }} \
            --query "SecretList[?contains(Name,'turaf/${{ inputs.environment }}')].Name" \
            --output text 2>/dev/null || echo "")
          for secret in $SECRETS; do
            aws secretsmanager delete-secret --secret-id "$secret" \
              --force-delete-without-recovery --region ${{ env.AWS_REGION }} 2>/dev/null || true
            echo "  Deleted secret: $secret"
          done

      - name: Cleanup summary
        if: always()
        run: |
          echo "## Cleanup Remaining Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Skipped (free):" >> $GITHUB_STEP_SUMMARY
          echo "- ACM certificates, IAM roles/policies, KMS (handled in Phase 2)" >> $GITHUB_STEP_SUMMARY
          echo "- Elastic IPs, VPC endpoints (handled in Phase 2)" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Phase 4 (optional): Destroy bootstrap resources
  #   (ECR repos, Terraform state S3 bucket, DynamoDB lock table)
  # ─────────────────────────────────────────────────────────────────────
  destroy-bootstrap:
    name: 'Destroy Bootstrap (${{ inputs.environment }})'
    needs: cleanup-remaining
    if: inputs.destroy_bootstrap == true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete ECR images (repos are free, images cost for storage)
        run: |
          echo "Deleting ECR images (keeping repositories — they are free)..."
          for repo in turaf-identity-service turaf-organization-service turaf-experiment-service turaf-metrics-service turaf-communications-service turaf-bff-api turaf-ws-gateway; do
            IMAGES=$(aws ecr list-images --repository-name "$repo" --region ${{ env.AWS_REGION }} \
              --query 'imageIds[*]' --output json 2>/dev/null || echo "[]")
            if [[ "$IMAGES" != "[]" && -n "$IMAGES" ]]; then
              aws ecr batch-delete-image --repository-name "$repo" --image-ids "$IMAGES" \
                --region ${{ env.AWS_REGION }} 2>/dev/null || true
              echo "  Deleted images from: $repo"
            else
              echo "  No images in: $repo"
            fi
          done

      - name: Empty and delete Terraform state bucket
        run: |
          BUCKET="turaf-terraform-state-${{ inputs.environment }}"
          echo "Emptying and deleting S3 bucket: $BUCKET"
          aws s3 rb "s3://${BUCKET}" --force 2>/dev/null || echo "Bucket $BUCKET not found"

      - name: Delete DynamoDB lock table (dev only)
        if: inputs.environment == 'dev'
        run: |
          echo "Deleting DynamoDB lock table..."
          aws dynamodb delete-table --table-name "turaf-terraform-locks" --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Lock table not found"

      - name: Delete remaining S3 buckets
        run: |
          echo "Deleting any remaining turaf S3 buckets..."
          BUCKETS=$(aws s3api list-buckets --query "Buckets[?contains(Name,'turaf')].Name" --output text 2>/dev/null || echo "")
          for bucket in $BUCKETS; do
            aws s3 rb "s3://${bucket}" --force 2>/dev/null || true
            echo "  Deleted bucket: $bucket"
          done

      - name: Bootstrap teardown summary
        if: always()
        run: |
          echo "## Bootstrap Teardown" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ECR Images**: Deleted (repos kept — free)" >> $GITHUB_STEP_SUMMARY
          echo "- **TF State Bucket**: Deleted" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────
  # Verification: confirm nothing billable remains
  # ─────────────────────────────────────────────────────────────────────
  verify:
    name: 'Verify Teardown (${{ inputs.environment }})'
    needs: [cleanup-remaining, destroy-bootstrap]
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check for remaining RDS instances (costs money)
        run: |
          RDS=$(aws rds describe-db-instances --region ${{ env.AWS_REGION }} \
            --query "DBInstances[?contains(DBInstanceIdentifier,'turaf')].{Id:DBInstanceIdentifier,Status:DBInstanceStatus}" \
            --output table 2>/dev/null || echo "")
          if [[ -z "$RDS" || "$RDS" != *"turaf"* ]]; then
            echo "✅ No RDS instances found"
          else
            echo "::warning::Remaining RDS instances (may still be deleting):"
            echo "$RDS"
          fi

      - name: Check for remaining ALBs (costs money)
        run: |
          for name in "turaf-alb-${{ inputs.environment }}" "turaf-internal-alb-${{ inputs.environment }}"; do
            ALB=$(aws elbv2 describe-load-balancers --names "$name" --region ${{ env.AWS_REGION }} \
              --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "None")
            if [[ "$ALB" != "None" && -n "$ALB" ]]; then
              echo "::warning::Remaining ALB: $name"
            fi
          done
          echo "✅ ALB check complete"

      - name: Check for remaining NAT Gateways (costs money)
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=*turaf*" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "None")
          if [[ "$VPC_ID" != "None" && -n "$VPC_ID" ]]; then
            NATS=$(aws ec2 describe-nat-gateways --region ${{ env.AWS_REGION }} \
              --filter "Name=vpc-id,Values=${VPC_ID}" "Name=state,Values=available,pending" \
              --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null || echo "")
            if [[ -n "$NATS" ]]; then
              echo "::warning::Remaining NAT Gateways: $NATS"
            else
              echo "✅ No NAT Gateways found"
            fi
          fi

      - name: Check for remaining Interface VPC Endpoints (costs money)
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=*turaf*" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "None")
          if [[ "$VPC_ID" != "None" && -n "$VPC_ID" ]]; then
            ENDPOINTS=$(aws ec2 describe-vpc-endpoints --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=${VPC_ID}" "Name=vpc-endpoint-type,Values=Interface" \
              --query 'VpcEndpoints[].VpcEndpointId' --output text 2>/dev/null || echo "")
            if [[ -n "$ENDPOINTS" ]]; then
              echo "::warning::Remaining Interface VPC Endpoints: $ENDPOINTS"
            else
              echo "✅ No Interface VPC Endpoints found"
            fi
          fi

      - name: Check for remaining Elastic IPs (costs money)
        run: |
          EIPS=$(aws ec2 describe-addresses --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=*turaf*" \
            --query 'Addresses[].{Id:AllocationId,IP:PublicIp}' --output table 2>/dev/null || echo "")
          if [[ -n "$EIPS" && "$EIPS" == *"turaf"* ]]; then
            echo "::warning::Remaining Elastic IPs:"
            echo "$EIPS"
          else
            echo "✅ No turaf Elastic IPs found"
          fi

      - name: Confirm free resources preserved
        run: |
          echo "--- Verifying free resources are intact ---"

          # IAM roles (should still exist)
          for role in "turaf-ecs-execution-role-${{ inputs.environment }}" "turaf-ecs-task-role-${{ inputs.environment }}"; do
            if aws iam get-role --role-name "$role" &>/dev/null; then
              echo "✅ IAM role preserved: $role"
            else
              echo "::notice::IAM role not found: $role"
            fi
          done

          # VPC (should still exist)
          VPC_ID=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=*turaf*" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "None")
          if [[ "$VPC_ID" != "None" && -n "$VPC_ID" ]]; then
            echo "✅ VPC preserved: $VPC_ID"
          else
            echo "::notice::VPC not found (may not have existed)"
          fi

      - name: Verification summary
        if: always()
        run: |
          echo "## Teardown Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bootstrap Destroyed**: ${{ inputs.destroy_bootstrap }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the step outputs above for any remaining **paid** resources." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> RDS instances may take several minutes to fully terminate." >> $GITHUB_STEP_SUMMARY
          echo "> KMS keys have a minimum 7-day deletion window." >> $GITHUB_STEP_SUMMARY
