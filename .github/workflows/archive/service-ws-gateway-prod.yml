name: Deploy WebSocket Gateway to PROD

on:
  push:
    branches: [main]
    paths:
      - 'services/ws-gateway/**'
      - '.github/workflows/service-ws-gateway-prod.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: ws-gateway
  ENVIRONMENT: prod
  AWS_ACCOUNT_ID: 811783768245
  ECR_REPOSITORY: turaf-ws-gateway

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './services/${{ env.SERVICE_NAME }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: security-scan
    environment: prod-environment
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsDeploymentRole
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: build-image
        working-directory: ./services/${{ env.SERVICE_NAME }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      - working-directory: ./services/${{ env.SERVICE_NAME }}/terraform
        run: terraform init -backend-config="bucket=turaf-terraform-state-${{ env.ENVIRONMENT }}"
      - working-directory: ./services/${{ env.SERVICE_NAME }}/terraform
        env:
          TF_VAR_image_tag: ${{ github.sha }}
        run: terraform apply -auto-approve
